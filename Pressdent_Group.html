    /* Asegura que el contenido quede sobre el fondo */
    .left, .right {
      position: relative;
      z-index: 1;
    }

    /* Columna izquierda con información de contacto */
    .left {
      flex: 1 1 300px;
      padding: 40px;
      background: rgba(255,255,255,0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Caja redonda para el logo principal */
    .brand {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 16px;
      background: white;
      padding: 6px; /* espacio entre el borde naranja y el icono */
      box-sizing: border-box;
      border: 4px solid #6b6663; /* borde naranja visible */
      box-shadow: 0 8px 20px rgba(15, 47, 77, 0.12);
    }

    /* Imagen del logo dentro de la caja */
    .brand img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #5f6b7a;
    }

    /* Se cambió aquí: tamaño más pequeño para h2 */
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #5f6b7a;
      font-weight: 600;
    }

    .cargo {
      margin: 0 0 18px;
      font-size: 17px;
      color: #5f6b7a;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .info p {
      margin: 8px 0;
      font-size: 15px;
      color: var(--gris);
    }

    .info .address {
      line-height: 1.4;
      padding-left: 22px;
      text-indent: -22px;
    }

    /* Contenedor de iconos sociales */
    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    /* Estilo de cada botón social */
    .socials a {
      text-decoration: none;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(15, 47, 77, 0.12);
      transition: transform 0.2s ease, background 0.2s ease;
      overflow: hidden;
    }

    .socials a img {
      width: 60%;
      height: 60%;
      object-fit: contain;
      display: block;
    }

    .socials a:hover {
      transform: translateY(-2px);
      background: var(--oro);
    }

    /* Columna derecha con el código QR */
    .right {
      flex: 1 1 240px;
      padding: 40px;
      background: rgba(255,255,255,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    /* Contenedor del QR */
    .qr-box {
      text-align: center;
    }

    /* Estilo de la imagen del código QR */
    .qr-box img {
      width: 170px;
      height: 170px;
      border: 6px solid #e8eef6;
      border-radius: 14px;
      padding: 8px;
      background: white;
    }

    /* Texto bajo el QR */
    .qr-label {
      margin-top: 10px;
      font-size: 14px;
      color: var(--gris);
      font-weight: 600;
    }

    /* Nota final debajo del QR */
    .note {
      margin-top: 8px;
      font-size: 12px;
      color: #8a95a2;
      text-align: center;
    }

    /* Ajustes responsivos para pantallas pequeñas */
    @media (max-width: 700px) {
      .card {
        flex-direction: column;
      }

      .left, .right {
        padding: 24px;
      }
    }
  </style>
</head>
